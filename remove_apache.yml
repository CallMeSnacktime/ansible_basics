---

- hosts: all
  become: true
  tasks:

  - name: remove apache and php on Ubuntu servers
    apt:
      name:
        - apache2
        - libapache2-mod-php
      state: absent
      update_cache: yes
    when: ansible_distribution == "Ubuntu"

  - name: remove httpd and php on RHEL9 OS
    dnf:
      name:
        - httpd
        - php
      state: absent
      update_cache: yes
    when: ansible_distribution == "RedHat"
